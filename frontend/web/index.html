<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mitroo – Asset Management & Team Dispatch">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mitroo">
  <meta name="theme-color" content="#C62828">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>Mitroo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Register push service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/push_sw.js');
    }

    // Helper called from Dart via dart:js
    function urlBase64ToUint8Array(base64String) {
      var padding = '='.repeat((4 - base64String.length % 4) % 4);
      var base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      var rawData = window.atob(base64);
      var outputArray = new Uint8Array(rawData.length);
      for (var i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    window.mitrooSubscribePush = function(vapidPublicKey, callback) {
      if (!('Notification' in window) || !('serviceWorker' in navigator)) {
        callback(null);
        return;
      }
      Notification.requestPermission().then(function(permission) {
        if (permission !== 'granted') { callback(null); return; }
        navigator.serviceWorker.ready.then(function(reg) {
          reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(vapidPublicKey),
          }).then(function(sub) {
            var json = sub.toJSON();
            callback(JSON.stringify({
              endpoint: json.endpoint,
              p256dhKey: json.keys.p256dh,
              authKey: json.keys.auth,
            }));
          }).catch(function() { callback(null); });
        });
      });
    };
  </script>
</body>
</html>
