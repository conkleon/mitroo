<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Mitroo – Asset Management & Team Dispatch">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mitroo">
  <meta name="theme-color" content="#C62828">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>Mitroo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Register unified service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          window._swReg = reg;
        }).catch(function(err) {
          console.error('sw registration failed', err);
        });
      });
    }

    // Capture install prompt for PwaService to use
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window._installPrompt = e;
    });

    // Track successful installation
    window.addEventListener('appinstalled', function() {
      window._appInstalled = true;
    });
  </script>
</body>
</html>
