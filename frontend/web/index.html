<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="R.C.D. – Asset Management & Team Dispatch">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>R.C.D.</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Register unified service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').then(function(reg) {
          window._swReg = reg;
        }).catch(function(err) {
          console.error('sw registration failed', err);
        });
      });
    }

    // Capture install prompt for PwaService to use
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window._installPrompt = e;
    });

    // Track successful installation
    window.addEventListener('appinstalled', function() {
      window._appInstalled = true;
    });

    // Check for and apply a SW update. Resolves true if an update was found
    // (page will reload automatically), false if already up-to-date.
    window._checkAndUpdate = function() {
      return new Promise(function(resolve) {
        if (!('serviceWorker' in navigator)) { resolve(false); return; }
        navigator.serviceWorker.ready.then(function(reg) {
          // Case 1: new SW already installed and waiting → activate it now
          if (reg.waiting) {
            reg.waiting.postMessage('skipWaiting');
            navigator.serviceWorker.addEventListener('controllerchange', function() {
              window.location.reload();
            }, { once: true });
            resolve(true);
            return;
          }
          // Case 2: no waiting SW → fetch latest and listen for install
          var resolved = false;
          reg.addEventListener('updatefound', function() {
            var newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', function() {
              if (newWorker.state === 'installed' && !resolved) {
                resolved = true;
                newWorker.postMessage('skipWaiting');
                navigator.serviceWorker.addEventListener('controllerchange', function() {
                  window.location.reload();
                }, { once: true });
                resolve(true);
              }
            });
          }, { once: true });
          reg.update().then(function() {
            setTimeout(function() { if (!resolved) resolve(false); }, 3000);
          }).catch(function() { if (!resolved) resolve(false); });
        }).catch(function() { resolve(false); });
      });
    };
  </script>
</body>
</html>
